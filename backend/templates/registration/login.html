{% load static %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід - VetClinic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'clinic/css/styles.css' %}?v=2">
</head>
<body class="login-body">
  <main class="login-wrap">
    <form method="post" class="panel login-panel">
      {% csrf_token %}
      <h1>Вхід до особистого кабінету</h1>
      <p>Введіть логін і пароль.</p>

      {% if form.errors %}
        <div class="alert alert-danger">Невірний логін або пароль.</div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label" for="{{ form.username.id_for_label }}">Логін</label>
        <input
          type="text"
          name="{{ form.username.html_name }}"
          id="{{ form.username.id_for_label }}"
          class="form-control form-control-lg"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="mb-4">
        <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
        <input
          type="password"
          name="{{ form.password.html_name }}"
          id="{{ form.password.id_for_label }}"
          class="form-control form-control-lg"
          autocomplete="current-password"
          required
        >
      </div>

      <button class="btn btn-primary btn-lg w-100" type="submit">Увійти</button>
    </form>
  </main>
</body>
</html>
