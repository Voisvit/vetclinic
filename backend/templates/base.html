{% load static %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VetClinic{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'clinic/css/styles.css' %}?v=2">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">VetClinic</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <div class="navbar-nav ms-auto gap-lg-2">
          <a class="nav-link" href="{% url 'home' %}">Головна</a>
          <a class="nav-link" href="{% url 'patient_list' %}">Пацієнти</a>
          <a class="nav-link" href="{% url 'vaccination_list' %}">Вакцинації</a>
          <a class="nav-link" href="{% url 'inventory_list' %}">Склад</a>
          <form method="post" action="{% url 'logout' %}" class="d-flex">
            {% csrf_token %}
            <button class="nav-link btn btn-link" type="submit">Вийти</button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% if messages %}
      <div class="mb-3">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }} mb-2">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
